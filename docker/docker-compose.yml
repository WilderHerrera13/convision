# ─────────────────────────────────────────────────────────────────────────────
# Convision — Stack completo de desarrollo
#
# Uso (desde la raíz del proyecto):
#   docker compose -f docker/docker-compose.yml up -d
#
# Primera vez:
#   Copia docker/.env.example → docker/.env y ajusta si es necesario.
#   Las migraciones y seeds se aplican automáticamente al iniciar el contenedor app.
#
# Hot reload:
#   - Backend: guarda cualquier archivo PHP → Laravel lo sirve al instante (php artisan serve).
#   - Frontend: guarda cualquier archivo en convision-front/src → Vite HMR actualiza el browser.
#
# Para ARM (Apple Silicon M1/M2/M3):
#   DOCKER_PLATFORM=linux/arm64/v8 docker compose -f docker/docker-compose.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: convision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-convision}
      POSTGRES_USER: ${DB_USERNAME:-convision}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-convision}
      TZ: America/Bogota
      PGTZ: America/Bogota
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - convision_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-convision} -d ${DB_DATABASE:-convision}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  # ── Laravel API (backend) ─────────────────────────────────────────────────
  app:
    build:
      context: ../convision-api
      dockerfile: Dockerfile
    container_name: convision-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../convision-api:/var/www/html
      - /var/www/html/vendor
    networks:
      - convision_network
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/var/www/html/docker/entrypoint.sh"]

  # ── React + Vite (frontend) ───────────────────────────────────────────────
  front:
    build:
      context: ../convision-front
      dockerfile: Dockerfile
    container_name: convision-front
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../convision-front:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://host.docker.internal:8001}
      - CHOKIDAR_USEPOLLING=true
    networks:
      - convision_network
    ports:
      - "${FRONT_PORT:-4300}:4300"
    depends_on:
      - app
    command: npm run dev -- --host 0.0.0.0

  # ── Adminer (gestor web de BD — soporta PostgreSQL) ───────────────────────
  adminer:
    image: adminer:latest
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: convision-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8082}:8080"
    networks:
      - convision_network
    depends_on:
      postgres:
        condition: service_healthy

networks:
  convision_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
