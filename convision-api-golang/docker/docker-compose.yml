version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: convision_go_postgres
    environment:
      POSTGRES_DB: convision
      POSTGRES_USER: convision
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convision -d convision"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: convision_go_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@convision.com
      PGADMIN_DEFAULT_PASSWORD: secret
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: convision_go_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_PORT: 8001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: convision
      DB_USERNAME: convision
      DB_PASSWORD: secret
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_TTL_HOURS: 24
      LOG_LEVEL: debug
    ports:
      - "8001:8001"
    restart: unless-stopped

volumes:
  postgres_data:
