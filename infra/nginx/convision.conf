server {
    listen 80;
    server_name *.app.opticaconvision.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name app.opticaconvision.com;
    return 302 https://main.app.opticaconvision.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.opticaconvision.com;

    ssl_certificate     /etc/letsencrypt/live/app.opticaconvision.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.opticaconvision.com/privkey.pem;

    return 302 https://main.app.opticaconvision.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name *.app.opticaconvision.com;

    ssl_certificate     /etc/letsencrypt/live/app.opticaconvision.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.opticaconvision.com/privkey.pem;

    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://localhost:8001;
    }

    location / {
        root /var/www/convision-front;
        try_files $uri /index.html;
    }
}
